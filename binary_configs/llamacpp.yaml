# yaml-language-server: $schema=https://raw.githubusercontent.com/akshaybabloo/binstall/refs/heads/main/schema.json
name: "llama-cpp"
description: "LLM inference in C/C++"
url: "https://github.com/ggml-org/llama.cpp"
installLocation: "~/llama"
download:
  linux:
    amd64:
      fileName: "llama-{{.Version}}-bin-ubuntu-vulkan-x64.tar.gz"
files:
  - fileName: "*"
    copyIt: true
    checkVersion: false
    copyContentsFrom: "llama-{{.Version}}"

  - fileName: "llama-cli"
    copyIt: true
    checkVersion: true
    versionCommand:
      args: "--version"
      regexVersion: "version: (\\d+)"
