# yaml-language-server: $schema=https://raw.githubusercontent.com/akshaybabloo/binstall/refs/heads/main/schema.json
name: "Zellij"
description: "A terminal multiplexer with a focus on usability and performance"
url: "https://github.com/zellij-org/zellij"
installLocation: "~/bin"
files:
  - fileName: "zellij"
    checkVersion: true
    copyIt: true
    versionCommand:
      args: "--version"
      regexVersion: "\\d+\\.\\d+\\.\\d+"
download:
  linux:
    amd64:
      fileName: "zellij-x86_64-unknown-linux-musl.tar.gz"