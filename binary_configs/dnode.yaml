# yaml-language-server: $schema=https://raw.githubusercontent.com/akshaybabloo/binstall/refs/heads/main/schema.json
name: "DNode"
description: "Find and delete node_modules folders in your project"
url: "https://github.com/akshaybabloo/dnode"
installLocation: "~/bin"
files:
  - fileName: "dnode"
    copyIt: true
    checkVersion: true
    versionCommand:
      args: "--version"
      regexVersion: "\\d+\\.\\d+\\.\\d+"
