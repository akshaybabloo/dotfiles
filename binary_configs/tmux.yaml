# yaml-language-server: $schema=https://raw.githubusercontent.com/akshaybabloo/binstall/refs/heads/main/schema.json
name: "Tmux"
description: "A terminal multiplexer with a focus on usability and performance"
url: "https://github.com/tmux/tmux-builds"
installLocation: "~/bin"
files:
  - fileName: "tmux"
    checkVersion: true
    copyIt: true
    versionCommand:
      args: "-V"
      regexVersion: "\\d+(?:\\.\\d+)+[a-z]?"
